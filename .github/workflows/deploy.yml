name: Deploy Vue

on:
  workflow_dispatch:
    inputs:
      reason:
        description: '手動部署原因'
        required: false
        default: '手動觸發'

jobs:
  deploy:
    name: Build & Deploy to GCP
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Install rsync
        run: sudo apt-get install -y rsync

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCP_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.GCP_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy (rsync dist to GCP)
        run: |
          rsync -avz --delete dist/ \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            ${{ secrets.GCP_USER }}@${{ secrets.GCP_HOST }}:/home/max91246/www/yamecent-vue-repo/dist/

      - name: Notify Telegram (Success)
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TG_CHAT_ID }}
          token: ${{ secrets.TG_BOT_TOKEN }}
          message: |
            ✅ *Vue 部署成功*
            📦 yamecent-vue
            💬 `${{ github.sha }}`
            📝 ${{ github.event.inputs.reason }}
            👤 ${{ github.actor }}

      - name: Notify Telegram (Failure)
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TG_CHAT_ID }}
          token: ${{ secrets.TG_BOT_TOKEN }}
          message: |
            ❌ *Vue 部署失敗*
            📦 yamecent-vue
            💬 `${{ github.sha }}`
            👤 ${{ github.actor }}
            🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
