name: Deploy Vue

on:
  workflow_dispatch:
    inputs:
      reason:
        description: '手動部署原因'
        required: false
        default: '手動觸發'

jobs:
  deploy:
    name: Deploy to GCP
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCP_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.GCP_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            ${{ secrets.GCP_USER }}@${{ secrets.GCP_HOST }} \
            "set -e
             echo '▶ 開始部署 yamecent-vue...'
             cd /home/max91246/www/yamecent-vue-repo
             sudo -u max91246 git fetch origin master
             sudo -u max91246 git reset --hard origin/master
             echo '✅ 部署完成'"

      - name: Notify Telegram (Success)
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TG_CHAT_ID }}
          token: ${{ secrets.TG_BOT_TOKEN }}
          message: |
            ✅ *Vue 部署成功*
            📦 yamecent-vue
            💬 `${{ github.sha }}`
            📝 ${{ github.event.head_commit.message || github.event.inputs.reason }}
            👤 ${{ github.actor }}

      - name: Notify Telegram (Failure)
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TG_CHAT_ID }}
          token: ${{ secrets.TG_BOT_TOKEN }}
          message: |
            ❌ *Vue 部署失敗*
            📦 yamecent-vue
            💬 `${{ github.sha }}`
            👤 ${{ github.actor }}
            🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
